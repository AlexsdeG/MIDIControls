; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps = 
	fortyseveneffects/MIDI Library@^5.0.2
	z3t0/IRremote@^4.6.2
	tttapa/Control Surface@^2.1.0
lib_ignore = 
	MIDIUSB

; ── Debug build ────────────────────────────────────────────────────────────
; Enables human-readable Serial output at 115200 baud.
; MIDI is disabled in this mode.
;
; BEFORE uploading this env:
;   1. Flash the ATmega16U2 back to standard Arduino CDC firmware.
;   2. Upload using this env, open Serial Monitor @ 115200.
; AFTER debugging:
;   1. Re-flash 16U2 with MocoLUFA.
;   2. Upload using [env:uno] to restore MIDI operation.
; ────────────────────────────────────────────────────────────────────────────
[env:uno_debug]
platform = atmelavr
board = uno
framework = arduino
lib_deps =
	fortyseveneffects/MIDI Library@^5.0.2
	z3t0/IRremote@^4.6.2
	tttapa/Control Surface@^2.1.0
lib_ignore =
	MIDIUSB
build_flags =
	-DDEBUG_SERIAL
